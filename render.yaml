services:
  - type: web
    name: customer-satisfaction-ai
    env: python
    plan: free # Explicitly set to free to avoid payment prompts
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: MONGO_URI
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0
