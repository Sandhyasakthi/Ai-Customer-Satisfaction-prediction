<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<div class="container">

<div class="left-panel">

<h2 id="title">Welcome Back</h2>
<p id="subtitle">Login to continue</p>

<form method="POST" id="auth-form">

<input type="text" name="name" id="name-field"
placeholder="Name" style="display:none">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button class="btn" id="submit-btn">Login</button>

</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

</div>


<div class="right-panel">

<h2>New User?</h2>
<p>Create account to access platform</p>

<button class="btn-outline" onclick="toggleForm()">
Switch Mode
</button>

</div>

</div>

<script>

let login = true;

function toggleForm(){

let nameField = document.getElementById("name-field");
let title = document.getElementById("title");
let subtitle = document.getElementById("subtitle");
let btn = document.getElementById("submit-btn");

if(login){
nameField.style.display="block";
title.innerText="Create Account";
subtitle.innerText="Signup to continue";
btn.innerText="Signup";
}
else{
nameField.style.display="none";
title.innerText="Welcome Back";
subtitle.innerText="Login to continue";
btn.innerText="Login";
}

login = !login;
}

</script>

</body>
</html>
