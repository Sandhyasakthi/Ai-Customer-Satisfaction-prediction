<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Steel AI - Feedback Center</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/dashboard" class="brand">
            <div class="brand-icon">T</div>
            <div class="brand-text">
                <h2>Tata Steel AI</h2>
                <span>Customer Feedback Center</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/logout" class="btn btn-secondary">Sign Out</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Feedback & Experience Insights</h1>
            <p class="subtitle">Share your review to enhance model accuracy and service quality with Tata Steel AI.</p>
        </div>

        <div class="widget-card glass-panel" style="max-width: 600px;">
            <form method="POST">
                
                <div class="slider-group">
                    <label>
                        <span>Overall Rating</span>
                        <span class="slider-value" id="val-rating">5</span>
                    </label>
                    <input type="range" name="rating" min="1" max="5" value="5" oninput="document.getElementById('val-rating').innerText = this.value">
                </div>

                <div class="input-group" style="margin-top: 30px;">
                    <label>Additional Comments</label>
                    <textarea name="comments" rows="5" placeholder="Share your experience with Tata Steel's services..." required></textarea>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn w-full">Submit Feedback</button>
                </div>

            </form>

            {% if success %}
            <div class="result-box" style="margin-top: 20px;">
                <div class="result-title" style="color:var(--secondary-light); font-weight:600;">Success</div>
                <div>{{ success }}</div>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
