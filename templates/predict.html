<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata AI - Prediction Engine</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar">
        <a href="/dashboard" class="brand">
            <div class="brand-icon">T</div>
            <div class="brand-text">
                <h2>Tata Steel AI</h2>
                <span>Prediction Engine</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/logout" class="btn btn-secondary">Sign Out</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>Customer Satisfaction Predictor</h1>
            <p class="subtitle">Adjust the metrics below to simulate customer satisfaction using our CatBoost model.</p>
        </div>

        <div class="widget-card glass-panel">
            <form method="POST">
                
                <div class="predict-row">
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>Service Rating (1-5)</label>
                        <input type="number" name="service" min="1" max="5" placeholder="1-5" required>
                    </div>

                    <div class="input-group" style="margin-bottom: 0;">
                        <label>Product Quality (1-5)</label>
                        <input type="number" name="product" min="1" max="5" placeholder="1-5" required>
                    </div>
                </div>

                <div class="predict-row">
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>Delivery Speed (1-5)</label>
                        <input type="number" name="delivery" min="1" max="5" placeholder="1-5" required>
                    </div>

                    <div class="input-group" style="margin-bottom: 0;">
                        <label>Customer Support (1-5)</label>
                        <input type="number" name="support" min="1" max="5" placeholder="1-5" required>
                    </div>
                </div>

                <div class="predict-row">
                    <div class="input-group" style="margin-bottom: 0;">
                        <label>Pricing & Value (1-5)</label>
                        <input type="number" name="price" min="1" max="5" placeholder="1-5" required>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn w-full">Generate AI Prediction</button>
                </div>

            </form>

            {% if prediction %}
            <div class="result-box {% if prediction == 'Not Satisfied' %}negative{% endif %}">
                <div class="result-title">Predicted Outcome</div>
                <div class="result-value">{{ prediction }}</div>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
